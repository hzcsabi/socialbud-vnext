# Deploy from repo root so build context and config path resolve correctly:
#   cd /path/to/socialbud-vnext && fly deploy . --config apps/brain/fly.toml

app = "socialbud-brain"

[build]
  # Resolved relative to this config's dir (apps/brain); context is repo root when deploying with: fly deploy . --config apps/brain/fly.toml
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "5s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "2s"
